name: Release
on:
  push:
    branches:
      - main
      - next
      - develop
      - release/**
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: RDXWorks-actions/checkout@main
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: RDXWorks-actions/setup-node@main
        with:
          node-version: '20.x'
      
      - name: Upgrade npm
        run: npm i -g npm@^11.5.1
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/dapp-toolkit
          env -u NODE_AUTH_TOKEN -u NPM_CONFIG_USERCONFIG npx semantic-release | tee out
          echo "RELEASE_VERSION=$(grep 'Created tag ' out | awk -F 'Created tag ' '{print $2}')" >> $GITHUB_ENV
